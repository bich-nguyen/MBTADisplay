<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
        <title>PLT-Boston Transit Dashboard</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="weather-box"></div>

        <div class="dashboard">
            <div class="col-left">
                <div id="south-station-red"></div>
                <div id="state-station-orange"></div>
                <div id="park-street-green"></div>
            </div>
            <div class="col-right">
                <div class="south-station-cr"></div>
                <div class="north-station-cr"></div>
                <div class="ferry"></div>
            </div>
        </div>

        <div id="map-container">
            <img id="map-image" src="Images/BostonMap_Labels.webp" alt="Map" />
        </div>

        <div id="news-ticker">
            <div id="ticker-track"></div>
        </div>

        <script src="config.js"></script>
        <script src="fetch.js"></script>
        <script src="render.js"></script>
        <script src="app.js"></script>
    </body>
</html>
