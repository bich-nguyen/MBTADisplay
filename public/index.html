<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, minimum-scale=1"
        />
        <title>MBTA Tracker</title>
        <link rel="stylesheet" href="/styles.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <!-- ================= WEATHER ================= -->
        <div id="weather-box" class="weather-box"></div>

        <div class="container-top">
            <!-- ================= RED LINE ================= -->
            <div id="south-station-red">
                <div class="predictions"></div>
            </div>
            <!-- ================= ORANGE LINE ================= -->
            <div id="state-station-orange">
                <div class="predictions"></div>
            </div>
            <!-- ================= BLUE LINE ================= -->
            <div id="state-station-blue">
                <div class="predictions"></div>
            </div>
        </div>

        <div class="container-bottom">
            <!-- ================= COMMUTER RAIL ================= -->
            <div id="south-station-cr-greenbush">
                <div class="predictions"></div>
            </div>

            <div id="south-station-cr-fairmount">
                <div class="predictions"></div>
            </div>

            <div id="south-station-cr-newbedford">
                <div class="predictions"></div>
            </div>

            <div id="south-station-cr-worcester">
                <div class="predictions"></div>
            </div>

            <div id="south-station-cr-franklin">
                <div class="predictions"></div>
            </div>

            <div id="south-station-cr-providence">
                <div class="predictions"></div>
            </div>

            <div id="south-station-cr-kingston">
                <div class="predictions"></div>
            </div>
            
            <div id="south-station-cr-needham">
                <div class="predictions"></div>
            </div>
        </div>
        <script src="/app.js"></script>
    </body>
</html>
